<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能人群密度监测系统 - 检测中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #090e1b; --card: #121a2f; --neon: #00e5ff;
            --blue: #0099ff; --green: #00ff88; --orange: #ffaa00; --red: #ff3366;
            --text: #fff; --gray: #a0b1c5;
        }
        body { font-family: "Microsoft YaHei"; background: var(--bg); color: var(--text); padding: 0 20px 20px; }
        .nav {
            background: var(--card); padding: 20px; text-align: center; border-bottom: 1px solid rgba(0,229,255,0.2);
            margin-bottom: 30px;
        }
        .nav a {
            color: var(--neon); margin: 0 20px; text-decoration: none; font-size: 18px; transition: 0.3s;
        }
        .nav a:hover { color: var(--blue); }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 65% 33%; gap: 2%; }
        .card {
            background: var(--card); border-radius: 12px; padding: 24px; border: 1px solid rgba(0,229,255,0.15);
            box-shadow: 0 0 20px rgba(0,0,0,0.3); margin-bottom: 20px; transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); }
        .card-title { font-size: 20px; color: var(--neon); margin-bottom: 20px; padding-left: 12px; border-left: 4px solid var(--blue); }
        .img-container {
            width: 100%; height: 500px; background: #0a101f; border-radius: 8px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed rgba(0,229,255,0.3);
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .heat-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .empty-tip { color: var(--gray); }
        .loading { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10; }
        .loader { width: 50px; height: 50px; border: 3px solid rgba(0,229,255,0.2); border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 30px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .btn-primary { background: linear-gradient(90deg, #0099ff, #00e5ff); color: white; }
        .btn-warning { background: linear-gradient(90deg, #ffaa00, #ff6600); color: white; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #imgUpload { display: none; }
        .data-item { margin-bottom: 20px; }
        .data-label { color: var(--gray); font-size: 15px; margin-bottom: 8px; }
        .data-value { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 8px; background: #1a243a; border-radius: 4px; overflow: hidden; }
        .progress { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .badge { padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .badge-success { background: rgba(0,255,136,0.15); color: var(--green); }
        .badge-danger { background: rgba(255,51,102,0.15); color: var(--red); }
        .warn-item { padding: 12px 15px; border-radius: 6px; margin-bottom: 10px; background: rgba(26,36,58,0.6); border-left: 4px solid var(--red); }
        .warn-normal { border-left-color: var(--green); }
        .toast {
            position: fixed; top: 30px; right: 30px; padding: 14px 25px; background: var(--card);
            border-left: 4px solid var(--neon); border-radius: 6px; color: white; z-index: 999;
            transform: translateX(120%); transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">首页</a>
        <a href="/detect/">图片检测</a>
        <a href="/video/">视频检测</a>
        <a href="/record/">历史记录</a>
        <a href="/agent/">智能体助手</a>
        <a href="/realtime/">实时摄像头检测</a>
    </div>

    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="left">
            <div class="card">
                <h2 class="card-title">图像检测区域</h2>
                <div class="img-container" id="imgBox">
                    <div class="loading" id="loading"><div class="loader"></div></div>
                    <span class="empty-tip">请上传人群图片进行检测</span>
                    <img id="sourceImg" style="display: none;">
                    <img class="heat-map" id="heatImg" style="display: none;">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="document.getElementById('imgUpload').click()">选择图片</button>
                    <input type="file" id="imgUpload" accept="image/*" style="display:none;">

                    <button class="btn btn-primary" onclick="startDetect()">开始检测</button>
                    <button class="btn btn-warning" onclick="resetPage()">重置清空</button>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="card">
                <h2 class="card-title">实时检测数据</h2>
                <div class="data-item">
                    <div class="data-label">实时人数</div>
                    <div class="data-value" id="peopleNum" style="color: var(--blue);">0</div>
                </div>
                <div class="data-item">
                    <div class="data-label">人群密度</div>
                    <div class="data-value" id="densityVal" style="color: var(--orange);">0.00</div>
                    <div class="progress-bar"><div class="progress" id="densityProgress" style="width: 0%; background: var(--orange);"></div></div>
                </div>
                <div class="data-item">
                    <div class="data-label">拥挤状态</div>
                    <div class="badge badge-success" id="crowdStatus">正常</div>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title">异常告警</h2>
                <div id="warnList">
                    <div class="warn-item warn-normal"><div>系统正常运行中</div></div>
                </div>
            </div>
            <!-- 👇 新增的AI分析面板 -->
            <div class="card">
                <h2 class="card-title">🤖 AI安全分析</h2>
                <div id="aiAnalysis" style="color:#fff; line-height:1.6; font-size:15px; padding: 10px; border-radius: 8px; background: rgba(26, 36, 58, 0.6);">
                    请先上传图片进行检测，AI将自动分析人群状态并给出安全建议...
                </div>
            </div>
        </div>
    </div>

<script>
    const imgUpload = document.getElementById('imgUpload');
    const sourceImg = document.getElementById('sourceImg');
    const heatImg = document.getElementById('heatImg');
    const loading = document.getElementById('loading');
    const toast = document.getElementById('toast');
    const densityProgress = document.getElementById('densityProgress');
    const aiAnalysis = document.getElementById('aiAnalysis');
    let recordList = JSON.parse(localStorage.getItem('crowdRecords')) || [];

    function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2500); }
    imgUpload.onchange = e => {
        const file = e.target.files[0]; if(!file) return;
        sourceImg.src = URL.createObjectURL(file);
        sourceImg.style.display = 'block'; heatImg.style.display = 'none';
        document.querySelector('.empty-tip').style.display = 'none';
        showToast('图片上传成功');
        // 重置AI分析内容
        aiAnalysis.innerHTML = '请点击开始检测，AI将自动分析人群状态并给出安全建议...';
    };

    function startDetect() {
        if (!imgUpload.files[0]) {
            alert("请先上传图片！");
            return;
        }

        loading.style.display = "flex";
        let file = imgUpload.files[0];
        let formData = new FormData();
        formData.append("image", file);

        fetch("/api/predict/", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            loading.style.display = "none";

            let people = res.count;
            let density = res.density;
            let abnormal = res.abnormal;
            let status = abnormal ? "拥挤" : "正常";

            document.getElementById("peopleNum").innerText = people;
            document.getElementById("densityVal").innerText = density;

            let progressWidth = Math.min(density * 1.5, 100);
            document.getElementById("densityProgress").style.width = progressWidth + "%";

            let statusEl = document.getElementById("crowdStatus");
            if (abnormal) {
                statusEl.className = "badge badge-danger";
                document.getElementById("warnList").innerHTML = `
                <div class="warn-item"><div>${new Date().toLocaleString()}：检测到人群拥挤！</div></div>`;
            } else {
                statusEl.className = "badge badge-success";
                document.getElementById("warnList").innerHTML = `
                <div class="warn-item warn-normal"><div>状态正常</div></div>`;
            }
            statusEl.innerText = status;

            if (res.detected_img_url) {
                sourceImg.src = res.detected_img_url;
            }

            saveRecord({ people, density, status });
            showToast("检测完成");

            // 调用AI分析接口
            fetch("/api/ai_analysis/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    count: people,
                    density: density,
                    is_abnormal: abnormal
                })
            })
            .then(res => res.json())
            .then(aiRes => {
                aiAnalysis.innerText = aiRes.analysis;
            })
            .catch(err => {
                aiAnalysis.innerText = "AI分析服务异常，请稍后再试。";
                console.error(err);
            });

        })
        .catch(err => {
            loading.style.display = "none";
            alert("后端连接失败：" + err);
            console.error(err);
        });
    }

    function saveRecord(data) {
    // 把图片也存进去
    const record = {
        time: new Date().toLocaleString(),
        people: data.people,
        density: data.density,
        status: data.status,
        image: sourceImg.src // 保存带框的图片
    };
    recordList.unshift(record);
    if(recordList.length>10) recordList.pop();
    localStorage.setItem('crowdRecords', JSON.stringify(recordList));
}

    function resetPage() {
        sourceImg.style.display = 'none';
        heatImg.style.display = 'none';
        sourceImg.src = '';
        imgUpload.value = '';
        document.querySelector('.empty-tip').style.display = 'block';
        document.getElementById('peopleNum').innerText='0';
        document.getElementById('densityVal').innerText='0.00';
        densityProgress.style.width='0%';
        document.getElementById('crowdStatus').className='badge badge-success';
        document.getElementById('crowdStatus').innerText='正常';
        document.getElementById('warnList').innerHTML='<div class="warn-item warn-normal"><div>系统正常运行中</div></div>';
        aiAnalysis.innerHTML = '请先上传图片进行检测，AI将自动分析人群状态并给出安全建议...';
        showToast('已清空数据');
    }
</script>
</body>
</html>
