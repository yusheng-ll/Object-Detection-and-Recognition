<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能人群密度检测 - 历史记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #090e1b; --card: #121a2f; --neon: #00e5ff;
            --blue: #0099ff; --green: #00ff88; --red: #ff3366;
            --text: #fff; --gray: #a0b1c5;
        }
        body { font-family: "Microsoft YaHei"; background: var(--bg); color: var(--text); padding: 0 20px 20px; }
        .nav {
            background: var(--card); padding: 20px; text-align: center;
            border-bottom: 1px solid rgba(0,229,255,0.2); margin-bottom: 30px;
        }
        .nav a {
            color: var(--neon); margin: 0 20px; text-decoration: none;
            font-size: 18px; transition: 0.3s;
        }
        .nav a:hover { color: var(--blue); }

        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: var(--card); border-radius: 12px; padding: 24px;
            border: 1px solid rgba(0,229,255,0.15);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title { font-size: 22px; color: var(--neon); margin-bottom: 20px; padding-left: 12px; border-left: 4px solid var(--blue); }

        .record-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .record-card {
            background: #1a2438; border-radius: 10px; padding: 15px;
            border: 1px solid rgba(0,229,255,0.1);
            transition: 0.3s;
        }
        .record-card:hover { transform: translateY(-3px); }

        .record-img, .record-video {
            width: 100%; height: 170px; object-fit: cover;
            border-radius: 8px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            background:#000;
        }

        .record-time { color: var(--gray); font-size: 12px; margin: 8px 0; }
        .record-info { font-size: 14px; line-height: 1.6; }
        .tag {
            padding: 4px 10px; border-radius: 12px; font-size: 12px;
            display: inline-block; margin-top: 6px;
        }
        .tag-normal { background: rgba(0,255,136,0.15); color: var(--green); }
        .tag-danger { background: rgba(255,51,102,0.15); color: var(--red); }

        .empty { text-align: center; color: var(--gray); padding: 40px; }
        .clear-btn {
            padding: 10px 20px; background: var(--red); color: #fff;
            border: none; border-radius: 6px; cursor: pointer;
            margin-bottom: 20px; transition: 0.3s;
        }
        .clear-btn:hover { opacity: 0.8; }

        /* 弹窗 */
        .img-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center;
            z-index: 9999; cursor: pointer;
        }
        .img-modal img, .img-modal video {
            max-width: 90%; max-height: 90%; border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,229,255,0.3);
        }
    </style>
</head>

<body>
    <div class="nav">
        <a href="/">首页</a>
        <a href="/detect/">图片检测</a>
        <a href="/video/">视频检测</a>
        <a href="/record/">历史记录</a>
        <a href="/agent/">智能体助手</a>
        <a href="/realtime/">实时摄像头检测</a>
    </div>

    <div class="container">
        <div class="card">
            <h2 class="card-title">检测历史记录</h2>
            <button class="clear-btn" onclick="clearAllRecords()">清空所有记录</button>

            <div class="record-grid">
                {% for item in records %}
                <div class="record-card">

                    {% if item.is_video %}
                    <!-- 视频显示 -->
                    <video class="record-video" controls onclick="openMedia('{{ item.file_path }}', true)">
                        <source src="{{ item.file_path }}" type="video/mp4">
                    </video>
                    {% else %}
                    <!-- 图片显示 -->
                    <img src="{{ item.file_path }}" class="record-img" onclick="openMedia('{{ item.file_path }}', false)">
                    {% endif %}

                    <div class="record-time">{{ item.create_time|date:"Y-m-d H:i:s" }}</div>
                    <div class="record-info">
                        <div>人数：{{ item.crowd_count }}</div>
                        <div>密度：{{ item.density_level }}</div>
                        <span class="tag {% if item.is_abnormal %}tag-danger{% else %}tag-normal{% endif %}">
                            {% if item.is_abnormal %}拥挤{% else %}正常{% endif %}
                        </span>
                    </div>
                </div>
                {% empty %}
                <div class="empty">暂无检测记录</div>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- 放大弹窗 -->
    <div class="img-modal" id="imgModal" onclick="closeMedia()">
        <div id="modalContent"></div>
    </div>

    <script>
        // 打开媒体（图片/视频）
        function openMedia(src, isVideo) {
            let modal = document.getElementById('imgModal');
            let content = document.getElementById('modalContent');

            if (isVideo) {
                content.innerHTML = `
                    <video controls autoplay style="max-width:90%;max-height:90%;border-radius:8px;">
                        <source src="${src}" type="video/mp4">
                    </video>
                `;
            } else {
                content.innerHTML = `<img src="${src}">`;
            }

            modal.style.display = 'flex';
        }

        // 关闭弹窗
        function closeMedia() {
            document.getElementById('imgModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';
        }

        // 清空所有记录
        function clearAllRecords() {
            if (!confirm("⚠️ 确定要清空所有历史记录吗？此操作不可恢复！")) return;

            fetch("{% url 'clear_records' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie('csrftoken'),
                    "Content-Type": "application/x-www-form-urlencoded",
                },
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    alert("✅ 清空成功！");
                    location.reload();
                } else {
                    alert("❌ 清空失败");
                }
            });
        }

        function getCookie(name) {
            let value = "; " + document.cookie;
            let parts = value.split("; " + name + "=");
            if (parts.length === 2) return parts.pop().split(";").shift();
        }
    </script>
</body>
</html>
