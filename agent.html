<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能人群密度监测系统 - AI智能体助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #090e1b; --card: #121a2f; --neon: #00e5ff;
            --blue: #0099ff; --green: #00ff88; --orange: #ffaa00; --red: #ff3366;
            --text: #fff; --gray: #a0b1c5;
        }
        body {
            font-family: "Microsoft YaHei";
            background: var(--bg);
            color: var(--text);
            padding: 0 20px 20px;
            background-image: radial-gradient(circle at 10% 10%, rgba(0,229,255,0.05), transparent 30%);
        }
        .nav {
            background: var(--card); padding: 20px; text-align: center;
            border-bottom: 1px solid rgba(0,229,255,0.2); margin-bottom: 30px;
        }
        .nav a {
            color: var(--neon); margin: 0 20px; text-decoration: none;
            font-size: 18px; transition: 0.3s;
        }
        .nav a:hover { color: var(--blue); }

        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: var(--card); border-radius: 12px; padding: 24px;
            border: 1px solid rgba(0,229,255,0.15);
            box-shadow: 0 0 20px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        .card-title {
            font-size: 22px; color: var(--neon); margin-bottom: 20px;
            padding-left: 12px; border-left: 4px solid var(--blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-box {
            height: 500px; overflow-y: auto; padding: 15px;
            border: 1px solid rgba(0,229,255,0.2); border-radius: 8px;
            margin-bottom: 20px; background: rgba(8, 14, 27, 0.5);
        }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 3px; }

        .msg { margin: 18px 0; display: flex; }
        .msg-robot { justify-content: flex-start; }
        .msg-user { justify-content: flex-end; }
        .msg-content {
            max-width: 75%; padding: 12px 18px; border-radius: 10px;
            line-height: 1.6; font-size: 15px; word-break: break-all;
        }
        .msg-robot .msg-content {
            background: rgba(0, 229, 255, 0.12); color: #fff;
            border-radius: 10px 10px 10px 0;
        }
        .msg-user .msg-content {
            background: linear-gradient(90deg, #0099ff, #00e5ff); color: #fff;
            border-radius: 10px 10px 0 10px;
        }

        .input-box { display: flex; gap: 12px; align-items: center; }
        #userInput {
            flex: 1; padding: 14px 18px; background: #1a243a;
            border: 1px solid rgba(0,229,255,0.3); border-radius: 8px;
            color: #fff; font-size: 15px; outline: none;
            transition: 0.3s;
        }
        #userInput:focus { border-color: var(--neon); }
        #sendBtn {
            padding: 14px 28px; border: none; border-radius: 8px;
            background: linear-gradient(90deg, #0099ff, #00e5ff);
            color: #fff; cursor: pointer; transition: 0.3s;
            font-size: 15px;
        }
        #sendBtn:hover { opacity: 0.9; transform: translateY(-2px); }
        #sendBtn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* 清空按钮 */
        .clear-btn {
            padding: 6px 12px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">首页</a>
        <a href="/detect/">图片检测</a>
        <a href="/video/">视频检测</a>
        <a href="/record/">历史记录</a>
        <a href="/agent/">智能体助手</a>
        <a href="/realtime/">实时摄像头检测</a>
    </div>

    <div class="container">
        <div class="card">
            <h2 class="card-title">
                🤖 人群监测AI智能体
                <button class="clear-btn" onclick="clearChatHistory()">清空对话</button>
            </h2>

            <div class="chat-box" id="chatBox">
                <div class="msg msg-robot">
                    <div class="msg-content">
                        你好！我是智能人群密度监测系统专属AI助手<br>
                        我可以为你解答：检测方法、拥挤预警、疏散方案、系统使用等问题~
                    </div>
                </div>
            </div>

            <div class="input-box">
                <input type="text" id="userInput" placeholder="请输入你的问题，按回车键快速发送">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 追加消息
    function addMessage(text, isUser = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = isUser ? 'msg msg-user' : 'msg msg-robot';
        msgDiv.innerHTML = `<div class="msg-content">${text}</div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 发送消息
    async function sendMessage() {
        const question = userInput.value.trim();
        if (!question) return;

        addMessage(question, true);
        userInput.value = '';
        sendBtn.disabled = true;
        sendBtn.textContent = '思考中...';

        try {
            const res = await fetch('/api/ai_chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: question })
            });
            const data = await res.json();
            addMessage(data.answer);
        } catch (e) {
            addMessage("AI 服务异常");
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';
        }
    }

    // 加载历史对话
    window.onload = function () {
        fetch('/api/get_chat_history/')
            .then(res => res.json())
            .then(data => {
                data.list.forEach(item => {
                    addMessage(item.user_msg, true);
                    addMessage(item.ai_reply);
                });
            });
    };

    // 清空对话
    async function clearChatHistory() {
        if (!confirm("确定要清空所有对话记录吗？")) return;
        const res = await fetch('/api/clear_chat_history/', { method: 'POST' });
        const data = await res.json();
        alert(data.msg);
        location.reload();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => e.key === 'Enter' && sendMessage());
</script>
</body>
</html>
